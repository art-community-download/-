<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Task Earn</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* === CSS RESET & BASE VARIABLES === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --error: #ef4444;
            --success: #10b981;
        }

        body {
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 100% 100%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 0% 100%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow-x: hidden;
            padding: 20px;
        }

        /* === GLASSMORPHISM CONTAINER === */
        .register-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* === INPUT FIELDS === */
        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group i.icon-left {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .input-group input:focus + i.icon-left,
        .input-group input:not(:placeholder-shown) + i.icon-left {
            color: var(--primary);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.3s;
        }

        .toggle-password:hover {
            color: var(--text-main);
        }

        /* === BUTTONS === */
        .btn {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* === SPINNER === */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .footer-text a:hover {
            text-decoration: underline;
            color: #8c9eff;
        }

        /* === TOAST NOTIFICATION === */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-left: 4px solid var(--primary);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-size: 14px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--error); }

    </style>
</head>
<body>

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <div class="register-container">
        <div class="header">
            <h1>Create Account</h1>
            <p>Join us and start earning (অ্যাকাউন্ট তৈরি করুন)</p>
        </div>

        <form id="regForm">
            <div class="input-group">
                <input type="text" id="fullname" placeholder="Full Name (আপনার নাম)" required autocomplete="off">
                <i class="fa-solid fa-user icon-left"></i>
            </div>

            <div class="input-group">
                <input type="tel" id="phone" placeholder="Phone Number (017XXXXXXXX)" required autocomplete="off">
                <i class="fa-solid fa-phone icon-left"></i>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Password (পাসওয়ার্ড)" required minlength="6">
                <i class="fa-solid fa-lock icon-left"></i>
                <i class="fa-solid fa-eye toggle-password" onclick="togglePass('password', this)"></i>
            </div>

            <div class="input-group">
                <input type="password" id="cpassword" placeholder="Confirm Password (কনফার্ম পাসওয়ার্ড)" required minlength="6">
                <i class="fa-solid fa-lock icon-left"></i>
                <i class="fa-solid fa-eye toggle-password" onclick="togglePass('cpassword', this)"></i>
            </div>

            <div class="input-group">
                <input type="text" id="refCode" placeholder="Referral Code (অপশনাল)" autocomplete="off">
                <i class="fa-solid fa-user-plus icon-left"></i>
            </div>

            <button type="submit" class="btn" id="regBtn">
                <span id="btnText">Register (রেজিস্ট্রেশন)</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
        </form>

        <div class="footer-text">
            Already have an account? <a href="index.html">Login Here (লগিন করুন)</a>
        </div>
    </div>

    <!-- FIREBASE & JS LOGIC -->
    <script type="module">
        // Import Firebase Modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDmPnQdJBFKQqq2l077B-NLDy8cer8TzfY",
            authDomain: "fake-a933d.firebaseapp.com",
            projectId: "fake-a933d",
            storageBucket: "fake-a933d.firebasestorage.app",
            messagingSenderId: "820359993169",
            appId: "1:820359993169:web:461011e0481966b423a570"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Elements
        const regForm = document.getElementById('regForm');
        const fullnameInput = document.getElementById('fullname');
        const phoneInput = document.getElementById('phone');
        const passwordInput = document.getElementById('password');
        const cpasswordInput = document.getElementById('cpassword');
        const refCodeInput = document.getElementById('refCode');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const regBtn = document.getElementById('regBtn');

        // Toggle Password Visibility Function (Global)
        window.togglePass = function(inputId, icon) {
            const input = document.getElementById(inputId);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        };

        // Toast Notification Function
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? '<i class="fa-solid fa-circle-check" style="color:var(--success); font-size:20px;"></i>' 
                                            : '<i class="fa-solid fa-circle-exclamation" style="color:var(--error); font-size:20px;"></i>';
            
            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);

            // Trigger Animation
            setTimeout(() => toast.classList.add('show'), 10);

            // Remove Toast
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        // Generate Random Referral Code (e.g. TE-X8K9M2)
        function generateReferralCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = 'TE-';
            for (let i = 0; i < 6; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // Handle Registration Submit
        regForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = fullnameInput.value.trim();
            const phone = phoneInput.value.trim();
            const password = passwordInput.value;
            const cpassword = cpasswordInput.value;
            const referredBy = refCodeInput.value.trim();

            // 1. Validation
            if (phone.length < 11 || isNaN(phone)) {
                showToast("সঠিক ১১ ডিজিটের ফোন নম্বর দিন!", "error");
                return;
            }
            if (password !== cpassword) {
                showToast("পাসওয়ার্ড ম্যাচ করছে না! (Password mismatch)", "error");
                return;
            }
            if (password.length < 6) {
                showToast("পাসওয়ার্ড অন্তত ৬ অক্ষরের হতে হবে!", "error");
                return;
            }

            // UI Loading state
            btnText.style.display = 'none';
            btnSpinner.style.display = 'block';
            regBtn.disabled = true;

            // Dummy email wrapper for Firebase Auth
            const dummyEmail = `${phone}@taskearn.com`;
            const myRefCode = generateReferralCode();

            try {
                // 2. Create User in Firebase Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, dummyEmail, password);
                const user = userCredential.user;

                // 3. Save User Profile in Firestore Database
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    fullName: name,
                    phone: phone,
                    balance: 0,
                    status: "INACTIVE", // Account inactive by default
                    completedTasks: 0,
                    referralCode: myRefCode,
                    referredBy: referredBy || null,
                    referralsCount: 0,
                    createdAt: serverTimestamp()
                });

                // 4. Success Action
                showToast("🎉 Your account created successfully!", "success");
                
                // Redirect to Login Page
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 2000);

            } catch (error) {
                console.error(error);
                let errorMessage = "রেজিস্ট্রেশন ব্যর্থ হয়েছে! (Registration Failed)";
                
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = "এই ফোন নম্বরটি ইতিমধ্যে ব্যবহৃত হয়েছে! (Phone already registered)";
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = "পাসওয়ার্ড খুব দুর্বল!";
                }

                showToast(errorMessage, "error");
                
                // Reset UI Loading state
                btnText.style.display = 'block';
                btnSpinner.style.display = 'none';
                regBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
